name: portfolio_app
description: تطبيق المدير الديناميكي للمحفظة الاستثمارية الشخصية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # Notifications
  flutter_local_notifications: ^16.1.0

  # File handling
  file_picker: ^6.1.1
  csv: ^5.1.1
  pdf: ^3.10.4
  share_plus: ^7.2.1
  permission_handler: ^11.1.0

  # UI
  fl_chart: ^0.65.0
  intl: ^0.18.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
